<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unity問題集</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    margin:30px;
}

h1{
    margin-bottom:10px;
}

#questionNumber{
    font-size:20px;
    margin-bottom:20px;
}

#question{
    font-size:28px;
    margin-bottom:30px;
}

.choiceLabel{
    display:block;
    width:400px;
    max-width:90%;
    margin:15px auto;
    padding:15px;

    background:#fffaf0;
    color:#4a4035;

    border:2px solid #d8c3a5;
    border-radius:14px;

    font-size:22px;
    cursor:pointer;

    transition:0.2s;
}

.choiceLabel:hover{
    background:#efe2c6;
}

/* 問題画面のボタン */
#answerButton,
#nextButton{
    width:250px;
    height:60px;

    background:#fffaf0;
    color:#4a4035;

    border:2px solid #d8c3a5;
    border-radius:14px;

    font-size:22px;
    cursor:pointer;

    transition:0.2s;
}

#answerButton:hover,
#nextButton:hover{
    background:#efe2c6;
}

.choiceLabel input{
    margin-right:10px;
}

#result{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
}

#answerButton{
    margin-top:20px;
}

#nextButton{
    display:none;
    position:fixed;
    right:20px;
    bottom:20px;
    padding:15px 30px;
    font-size:24px;
}

button{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}

</style>
</head>
<body>

<h1>Unity問題集</h1>

<div id="questionNumber"></div>

<h2 id="question"></h2>

<div id="codeArea"></div>

<div id="choices"></div>

<div id="result"></div>

<button id="answerButton">
回答する
</button>

<button id="nextButton">
次へ →
</button>

<script>

const questions = [

{
    question:"下のコードを実行するとどうなる？",

    code:`
void Start()
{
    Debug.Log("Hello");
}
`,

    correctAnswers:[
        "ゲーム開始時にhelloと表示される",
        "helloと表示される",
        "ゲーム開始時にhelloが表示される"
    ]
},

{
    question:"下のコードを実行すると何が表示される？",

    code:`
int score = 5;

void Start()
{
    score += 3;
    Debug.Log(score);
}
`,

    correctAnswers:[
        "8と表示される",
        "8が表示される",
        "scoreは8になる"
    ]
}

];


let currentQuestion = 0;
let score = 0;
let selectedOrder = [];



showQuestion();

function showQuestion()
{
    const q = questions[currentQuestion];

    document.getElementById("questionNumber").textContent =
    `問題 ${currentQuestion + 1} / ${questions.length}`;

    document.getElementById("question").innerHTML =
q.question;

document.getElementById("codeArea").innerHTML = "";

if(q.image)
{
    document.getElementById("codeArea").innerHTML =
    `<img src="${q.image}" class="questionImage">`;
}
else if(q.code)
{
    document.getElementById("codeArea").innerHTML =
    `<pre>${q.code}</pre>`;
}

    document.getElementById("result").textContent = "";

    document.getElementById("nextButton").style.display =
    "none";

    document.getElementById("answerButton").style.display =
    "inline-block";

    document.getElementById("answerArea").innerHTML =
`
<textarea
id="userAnswer"
placeholder="ここに回答を書いてください"
style="
width:80%;
max-width:800px;
height:180px;
padding:15px;
font-size:20px;
border:2px solid #d8c3a5;
border-radius:10px;
resize:vertical;
"></textarea>
`;
}

document.getElementById("answerButton").onclick =
function()
{
    const q = questions[currentQuestion];

    const corrects =
    Array.isArray(q.correct)
    ? q.correct
    : [q.correct];

    const userAnswer =
document.getElementById("userAnswer")
.value
.trim();

if(userAnswer === "")
{
    alert("回答を入力してください");
    return;
}

   let isCorrect;

if(q.ordered)
{
    isCorrect =
    JSON.stringify(selectedOrder) ===
    JSON.stringify(corrects);
}
else
{
    isCorrect =
    selected.length === corrects.length &&
    selected.every(x =>
    corrects.includes(x));
}

    const labels =
    document.querySelectorAll(".choiceLabel");

    labels.forEach(label =>
    {
        const input =
        label.querySelector("input");

        input.disabled = true;

        if(corrects.includes(input.value))
        {
            label.style.backgroundColor =
            "lightgreen";
        }
    });

    if(isCorrect)
    {
        score++;

        document.getElementById("result").textContent =
        "⭕ 正解";
    }
    else
    {
        selected.forEach(value =>
        {
            if(!corrects.includes(value))
            {
                labels.forEach(label =>
                {
                    const input =
                    label.querySelector("input");

                    if(input.value === value)
                    {
                        label.style.backgroundColor =
                        "#ff9999";
                    }
                });
            }
        });

        document.getElementById("result").textContent =
        "❌ 不正解";
    }

    document.getElementById("answerButton").style.display =
    "none";

    document.getElementById("nextButton").style.display =
    "block";
};

document.getElementById("nextButton").onclick =
function()
{
    currentQuestion++;

    if(currentQuestion >= questions.length)
    {
        showResult();
    }
    else
    {
        showQuestion();
    }
};

function showResult()
{
document.body.innerHTML =
`
<div style="
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#f7f1e3;
    color:#4a4035;
    text-align:center;
">

    <h1 style="
        font-size:60px;
        margin-bottom:20px;
    ">
        結果発表
    </h1>

    <h2 style="
        font-size:40px;
        margin-bottom:50px;
    ">
        ${score} / ${questions.length} 問正解
    </h2>

    <button
        onclick="location.reload()"
        style="
            width:300px;
            height:70px;
            font-size:24px;
            margin-bottom:20px;

            background:#fffaf0;
            color:#4a4035;

            border:2px solid #d8c3a5;
            border-radius:14px;

            cursor:pointer;
        "
    >
        もう一度挑戦
    </button>

    <button
        onclick="location.href='index.html'"
        style="
            width:300px;
            height:70px;
            font-size:24px;

            background:#fffaf0;
            color:#4a4035;

            border:2px solid #d8c3a5;
            border-radius:14px;

            cursor:pointer;
        "
    >
        問題選択へ戻る
    </button>

</div>
`;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unity基礎の基礎問題</title>

<style>

body{
    font-family:sans-serif;
    text-align:center;
    margin:30px;
}

h1{
    margin-bottom:10px;
}

#questionNumber{
    font-size:20px;
    margin-bottom:20px;
}

#question{
    font-size:28px;
    margin-bottom:30px;
}

.choiceLabel{
    display:block;
    width:400px;
    max-width:90%;
    margin:15px auto;
    padding:15px;

    background:#fffaf0;
    color:#4a4035;

    border:2px solid #d8c3a5;
    border-radius:14px;

    font-size:22px;
    cursor:pointer;

    transition:0.2s;
}

.choiceLabel:hover{
    background:#efe2c6;
}

/* 問題画面のボタン */
#answerButton,
#nextButton{
    width:250px;
    height:60px;

    background:#fffaf0;
    color:#4a4035;

    border:2px solid #d8c3a5;
    border-radius:14px;

    font-size:22px;
    cursor:pointer;

    transition:0.2s;
}

#answerButton:hover,
#nextButton:hover{
    background:#efe2c6;
}

.choiceLabel input{
    margin-right:10px;
}

#result{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
}

#answerButton{
    margin-top:20px;
}

#nextButton{
    display:none;
    position:fixed;
    right:20px;
    bottom:20px;
    padding:15px 30px;
    font-size:24px;
}

button{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}
#codeArea{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

#codeArea pre{
    width:700px;
    max-width:90%;

    margin:0;

    padding:20px;

    background:#fffaf0;
    color:#4a4035;

    border:2px solid #d8c3a5;
    border-radius:16px;

    font-family:Consolas, monospace;
    font-size:24px;
    line-height:1.6;

    text-align:left;

    white-space:pre;
    overflow-x:auto;

    box-sizing:border-box;
}
</style>
</head>
<body>

<h1>Unity問題集</h1>

<div id="questionNumber"></div>

<h2 id="question"></h2>

<div id="codeArea"></div>

<div id="choices"></div>

<div id="result"></div>

<button id="answerButton">
回答する
</button>

<button id="nextButton">
次へ →
</button>

<script>

const questions = [

{
    question:"start関数はいつ実行されるか",

    correct:"ゲームスタート直後に1回",

    wrong:[
        "ゲーム終了時",
        "ゲーム開始してから毎フレーム",
        "ゲーム開始してから毎秒"
    ]
},

{
    question:"Updeate関数はいつ実行されるか",

    correct:[
        "毎フレーム実行される",

    ],

    wrong:[
        "シーンを切り替える",
        "オブジェクトを削除する",
        "毎秒実行される",
    ]
},

{
    question:"Debug.Log()の役割は何か",

    correct:
        "コンソールに文字を表示する",
        

    wrong:[
        "オブジェクトを生成する",
        "文字を表示する",
        "ゲームを終了する"
    ]
},

{
    question:"画像の中のうちフォルダやスクリプトを作るためにはどれを選べばいいか",

    image:"quiz1_Image.png",

    correct:"1",

    wrong:[
        "2",
        "3",
        
    ]
},

{
    question:"次の画像のうち、スクリプトを作りにはどれを選べばいいか",

    image:"quiz2_Image.png",

    correct:"2",

    wrong:[
        "1",
        "3",
    ]
},

{
    question:"",


    correct:"",

    wrong:[
        "",
        "",
        ""
    ]
},

];


let currentQuestion = 0;
let score = 0;
let selectedOrder = [];
let answerHistory = [];


showQuestion();

function showQuestion()
{
    const q = questions[currentQuestion];

    document.getElementById("questionNumber").textContent =
    `問題 ${currentQuestion + 1} / ${questions.length}`;

    document.getElementById("question").innerHTML =
q.question;

document.getElementById("codeArea").innerHTML = "";

if(q.image)
{
    document.getElementById("codeArea").innerHTML =
    `<img src="${q.image}" class="questionImage">`;
}
else if(q.code)
{
    document.getElementById("codeArea").innerHTML =
    `<pre>${q.code}</pre>`;
}

    document.getElementById("result").textContent = "";

    document.getElementById("nextButton").style.display =
    "none";

    document.getElementById("answerButton").style.display =
    "inline-block";

    const choicesDiv =
    document.getElementById("choices");

    choicesDiv.innerHTML = "";
    selectedOrder = [];

    const corrects =
    Array.isArray(q.correct)
    ? q.correct
    : [q.correct];

    let choices = [
        ...corrects,
        ...q.wrong
    ];

    if(!q.ordered)
    {
    choices.sort(() => Math.random() - 0.5);
    }

    const inputType =
    corrects.length > 1
    ? "checkbox"
    : "radio";

    choices.forEach(choice =>
    {
        const label =
        document.createElement("label");

        label.className =
        "choiceLabel";

        label.innerHTML =
        `
        <input
        type="${inputType}"
        name="answer"
        value="${choice}">
        ${choice}
        `;

        choicesDiv.appendChild(label);
    });
}

document.getElementById("answerButton").onclick =
function()
{
    const q = questions[currentQuestion];

    const corrects =
    Array.isArray(q.correct)
    ? q.correct
    : [q.correct];

    const selected =
    [...document.querySelectorAll(
    "#choices input:checked"
    )]
    .map(x => x.value);

    if(selected.length === 0)
    {
        alert("回答を選択してください");
        return;
    }

   let isCorrect;

if(q.ordered)
{
    isCorrect =
    JSON.stringify(selectedOrder) ===
    JSON.stringify(corrects);
}
else
{
    isCorrect =
    selected.length === corrects.length &&
    selected.every(x =>
    corrects.includes(x));
}

    const labels =
    document.querySelectorAll(".choiceLabel");

    labels.forEach(label =>
    {
        const input =
        label.querySelector("input");

        input.disabled = true;

        if(corrects.includes(input.value))
        {
            label.style.backgroundColor =
            "lightgreen";
        }
    });

    answerHistory.push({
    question: q.question,
    selected: selected,
    correct: corrects,
    isCorrect: isCorrect
});

    if(isCorrect)
    {
        score++;

        document.getElementById("result").textContent =
        "⭕ 正解";
    }
    else
    {
        selected.forEach(value =>
        {
            if(!corrects.includes(value))
            {
                labels.forEach(label =>
                {
                    const input =
                    label.querySelector("input");

                    if(input.value === value)
                    {
                        label.style.backgroundColor =
                        "#ff9999";
                    }
                });
            }
        });

        document.getElementById("result").textContent =
        "❌ 不正解";
    }

    document.getElementById("answerButton").style.display =
    "none";

    document.getElementById("nextButton").style.display =
    "block";
};

document.getElementById("nextButton").onclick =
function()
{
    currentQuestion++;

    if(currentQuestion >= questions.length)
    {
        showResult();
    }
    else
    {
        showQuestion();
    }
};

function showResult()
{
    let scores =
JSON.parse(
localStorage.getItem("quizScores")
) || [];

scores.push(score);

localStorage.setItem(
"quizScores",
JSON.stringify(scores)
);

const ranking =
[...scores]
.sort((a,b)=>b-a)
.slice(0,3);

const bestScore =
Math.max(...scores);
    let reviewHTML = "";

    answerHistory.forEach((item,index)=>
    {
        reviewHTML += `
        <div style="
            border:2px solid #d8c3a5;
            border-radius:12px;
            padding:15px;
            margin:15px 0;
            background:white;
            text-align:left;
        ">

            <h3>
                問題${index + 1}
                ${item.isCorrect ? "⭕" : "❌"}
            </h3>

            <p>
                ${item.question}
            </p>

            <p>
                <b>あなたの回答：</b>
                ${item.selected.join("、")}
            </p>

            <p>
                <b>正解：</b>
                ${item.correct.join("、")}
            </p>

        </div>
        `;
    });

    document.body.innerHTML =
    `
    <div style="
        padding:30px;
        background:#f7f1e3;
        min-height:100vh;
    ">

        <h1>
            結果発表
        </h1>

        <h2>
            ${score} / ${questions.length} 問正解
        </h2>
            <div style="
font-size:24px;
margin:20px;
">

自己ベスト：
${bestScore}点

<br><br>

🥇 ${ranking[0] ?? "-"}点
<br>
🥈 ${ranking[1] ?? "-"}点
<br>
🥉 ${ranking[2] ?? "-"}点

<br><br>

挑戦回数：
${scores.length}回

</div>

        <div style="
            max-width:900px;
            margin:auto;
            max-height:500px;
            overflow-y:auto;
            padding:10px;
        ">
            ${reviewHTML}
        </div>

        <br>

        <button
            onclick="location.reload()"
            style="
                width:300px;
                height:70px;
                font-size:24px;
                margin-bottom:20px;
            "
        >
            もう一度挑戦
        </button>

        <br>

        <button
            onclick="location.href='index.html'"
            style="
                width:300px;
                height:70px;
                font-size:24px;
            "
        >
            問題選択へ戻る
        </button>

    </div>
    `;
}

</script>

</body>
</html>
